---
modules:
  - type: dnf
    install:
      skip-unavailable: true
      install-weak-deps: false
      packages:
        - hyprland
        - hyprland-plugins
        - hyprland-devel
        - hypridle
        - hyprlock
        - hyprnome
  - type: os-release
    properties:
      ID: guacho
      NAME: Guacho
      ID_LIKE: fedora
      PRETTY_NAME: Guacho Hyprland
