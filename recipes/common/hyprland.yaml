---
modules:
  - type: dnf
    install:
      skip-unavailable: true
      install-weak-deps: true
      packages:
        - hyprland-git
        - hyprland-plugins-git
        - hyprland-guiutils
        - hyprpaper
        - hyprlock
        - hyprpolkitagent
        - hyprpwcenter
        - hyprshot
        - hyprsunset
        - hypridle
  - type: os-release
    properties:
      ID: guacho
      NAME: Guacho
      ID_LIKE: fedora
      PRETTY_NAME: Guacho Hyprland
