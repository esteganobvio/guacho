---
modules:
  - type: dnf
    install:
      skip-unavailable: true
      install-weak-deps: false
      packages:
        - niri
        - xwayland-satellite
        - xdg-desktop-portal-gnome
        - noctalia-shell-v5
        - noctalia-greeter
  - type: files
    files:
      - source: niri/greetd
        destination: /etc/greetd
  - type: os-release
    properties:
      ID: guacho
      NAME: Guacho
      ID_LIKE: fedora
      PRETTY_NAME: Guacho Niri
